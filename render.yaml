services:
  - type: web
    name: finance-analyzer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false  # Set this manually to your Vercel URL
      - key: DATABASE_URL
        sync: false  # Set this if using PostgreSQL
    plan: free
